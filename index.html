<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mi Portfolio Pro</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Librerías -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.0/animate.min.css" rel="stylesheet">

<!-- TU CSS -->
<link href="css/style.css" rel="stylesheet">

</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-b navbar-expand-md fixed-top navbar-trans" id="mainNav">
  <div class="container">
    <a class="navbar-brand js-scroll" href="#">MiPortfolio</a>
  </div>
</nav>

<!-- INTRO -->
<div class="intro bg-image" style="background-image: url(img/intro-Img.JPG)">
  <div class="overlay-itro"></div>
  <div class="intro-content display-table">
    <div class="table-cell">
      <div class="container text-center">
        <h1 class="intro-title mb-4">Soy Dev</h1>
        <p class="intro-subtitle">
          <span class="text-slider-items">Diseñador,Desarrollador,Freelancer</span>
          <strong class="text-slider"></strong>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- ABOUT -->
<section class="about-mf sect-pt4">
  <div class="container">
    <div class="box-shadow-full text-center">
      <h2>Sobre mí</h2>
      <p>Portfolio profesional estilo DevFolio 🚀</p>
    </div>
  </div>
</section>

<!-- FILTROS -->
<section class="sect-4">
<div class="container text-center">

<h2 class="mb-4">Portfolio</h2>

<button class="btn btn-primary filter-btn" data-filter="all">Todo</button>
<button class="btn btn-outline-primary filter-btn" data-filter="web">Web</button>
<button class="btn btn-outline-primary filter-btn" data-filter="design">Design</button>

</div>
</section>

<!-- PORTFOLIO -->
<section class="sect-4">
<div class="container">
<div class="row">

<div class="col-md-4 work-item web">
  <div class="work-box">
    <img src="img/1.jpg" class="img-fluid">
    <div class="work-content">
      <h3 class="w-title">Proyecto Web</h3>
      <span class="w-ctegory">Web</span>
    </div>
  </div>
</div>

<div class="col-md-4 work-item design">
  <div class="work-box">
    <img src="img/2.jpg" class="img-fluid">
    <div class="work-content">
      <h3 class="w-title">Diseño UI</h3>
      <span class="w-ctegory">Design</span>
    </div>
  </div>
</div>

<div class="col-md-4 work-item web">
  <div class="work-box">
    <img src="img/4.jpg" class="img-fluid">
    <div class="work-content">
      <h3 class="w-title">App Web</h3>
      <span class="w-ctegory">Web</span>
    </div>
  </div>
</div>

</div>
</div>
</section>

<!-- CONTACTO -->
<section class="sect-4">
<div class="container">

<h2 class="text-center mb-4">Contacto</h2>

<form action="https://formspree.io/f/tu_id" method="POST">

<div class="form-group">
<input type="text" name="name" class="form-control" placeholder="Nombre" required>
</div>

<div class="form-group">
<input type="email" name="email" class="form-control" placeholder="Email" required>
</div>

<div class="form-group">
<textarea name="message" class="form-control" rows="5" placeholder="Mensaje"></textarea>
</div>

<div class="text-center">
<button class="button button-a button-big">Enviar</button>
</div>

</form>

</div>
</section>

<!-- FOOTER -->
<footer class="text-center">
<p>© Portfolio PRO</p>
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/waypoints/4.0.1/jquery.waypoints.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/counterup/1.0/jquery.counterup.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.9/typed.min.js"></script>

<script src="js/main.js"></script>

</body>
</html>
